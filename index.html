<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>VIDEOLLAMADAS PRO</title>
<style>
body {
    margin:0;
    background:#0b0e14;
    color:white;
    font-family:Arial;
    text-align:center;
}
#video {
    width:100%;
    max-width:800px;
    margin:auto;
    border-radius:12px;
    background:black;
}
.controls {
    margin-top:20px;
}
button, select {
    padding:10px;
    margin:5px;
    border:none;
    border-radius:8px;
}
button {
    background:#22c55e;
    color:black;
    font-weight:bold;
}
</style>
</head>

<body>

<h2>🎥 SALA EN VIVO</h2>

<video id="video" autoplay playsinline muted></video>

<div class="controls">
    <select id="cameraSelect"></select>
    <button onclick="startStream()">INICIAR</button>
</div>

<script>
let localStream;

async function getCameras(){
    const devices = await navigator.mediaDevices.enumerateDevices();
    const cams = devices.filter(d => d.kind === "videoinput");
    const select = document.getElementById("cameraSelect");

    cams.forEach(cam=>{
        let option = document.createElement("option");
        option.value = cam.deviceId;
        option.text = cam.label || "Cámara";
        select.appendChild(option);
    });
}

async function startStream(){
    const deviceId = document.getElementById("cameraSelect").value;

    localStream = await navigator.mediaDevices.getUserMedia({
        video:{ deviceId: { exact: deviceId }},
        audio:true
    });

    document.getElementById("video").srcObject = localStream;

    // 🔥 AQUÍ SE ENVÍA A VDO NINJA
    const room = new URLSearchParams(window.location.search).get("room");
    const slot = new URLSearchParams(window.location.search).get("slot");

    const iframe = document.createElement("iframe");
    iframe.style.display="none";

    iframe.src = `https://vdo.ninja/?push=${slot}&room=${room}&webcam&autostart&clean`;

    document.body.appendChild(iframe);
}

getCameras();
</script>

</body>
</html>
