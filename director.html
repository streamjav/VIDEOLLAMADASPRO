<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamJav Director</title>

<style>
body{
  margin:0;
  background:#0b0f1a;
  font-family:Arial;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#121a2b;
  padding:30px;
  border-radius:20px;
  width:320px;
  text-align:center;
  box-shadow:0 10px 40px rgba(0,0,0,.4);
}

h1{
  margin:0 0 10px;
  font-size:22px;
}

p{
  color:#8ea3c7;
  font-size:13px;
}

button{
  margin-top:20px;
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  background:#37e28f;
  color:#04140c;
  font-size:15px;
  cursor:pointer;
}

iframe{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  border:none;
  display:none;
  background:black;
}
</style>
</head>

<body>

<div class="card" id="ui">
  <h1 id="title">Preparando señal...</h1>
  <p id="subtitle">Conectando a la sala</p>
  <button onclick="start()">COMENZAR</button>
</div>

<iframe id="frame" allow="camera; microphone; autoplay; display-capture"></iframe>

<script>
const params = new URLSearchParams(location.search);

const room = params.get("room") || "PROINKASWITCH";
const push = params.get("push") || "2dj5BAw";
const name = params.get("name") || "vMix Video";
const audio = params.get("audio") || "Line 1 (Virtual Audio Cable)";
const mode = params.get("mode") || "camera"; // 👈 clave

document.getElementById("title").innerText = "Sala " + room;

function buildURL(){
  let url = new URL("https://vdo.ninja/");

  url.searchParams.set("director", room);
  url.searchParams.set("push", push);
  url.searchParams.set("label", name);
  url.searchParams.set("vlabel", name);
  url.searchParams.set("alabel", audio);

  url.searchParams.set("autostart","1");
  url.searchParams.set("autoplay","1");
  url.searchParams.set("directorstfu","1");
  url.searchParams.set("clean","1");
  url.searchParams.set("nochat","1");
  url.searchParams.set("nodashboard","1");

  if(mode === "screen"){
    url.searchParams.set("screenshare","1");
    url.searchParams.set("screensharetype","1");
  } else {
    url.searchParams.set("webcam","1"); // 👈 ESTO ARREGLA TU PROBLEMA
  }

  return url.toString();
}

function start(){
  const frame = document.getElementById("frame");
  frame.src = buildURL();

  document.getElementById("ui").style.display = "none";
  frame.style.display = "block";
}
</script>

</body>
</html>
