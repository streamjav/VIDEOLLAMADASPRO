<iframe id="directorFrame"
        allow="camera; microphone; display-capture; autoplay; fullscreen"
        style="display:none;position:fixed;inset:0;border:none;"></iframe>
<script>
  // ParĂ¡metros obtenidos de la URL
  const params = new URLSearchParams(location.search);
  const room = params.get("room"), push = params.get("push");
  const name = (params.get("name") || "").replace(/ /g,"*");
  const audio = (params.get("audio") || "").replace(/\s+/g,"*");
  // Construye URL real de VDO.Ninja
  let url = `https://vdo.ninja/?director=${room}&push=${push}`;
  url += `&vlabel=${name}&audiodevice=${audio}`;
  url += `&screenshare&screensharetype=1`;
  url += `&cleanoutput&cleandirector&autostart&autoplay&nopreview`;
  // Carga la sesiĂ³n oculto
  const frame = document.getElementById("directorFrame");
  frame.src = url;
  frame.style.display = "block";
</script>
