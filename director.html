<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Presentador - Videollamada</title>
</head>
<body style="margin:0; background:#000;">
<script>
  const params = new URLSearchParams(window.location.search);
  const room = params.get('room') || 'ROOM';
  // Crear iframe de VDO.Ninja en modo director
  const iframe = document.createElement('iframe');
  iframe.allow = "camera *; microphone *; fullscreen; display-capture; autoplay";
  // Fuente con director, y publicando su cámara (ID='Director')
  iframe.src = "https://vdo.ninja/?director=" + encodeURIComponent(room)
             + "&push=Director&webcam&autostart&cleanoutput";
  Object.assign(iframe.style, {
    position: 'fixed', top: 0, left: 0,
    width: '100%', height: '100%', border: 'none'
  });
  document.body.appendChild(iframe);
</script>
</body>
</html>
