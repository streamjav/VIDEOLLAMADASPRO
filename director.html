<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0e14">
<title>StreamJav Director</title>
<style>
  :root{
    --bg:#0b0e14;
    --bg2:#101725;
    --card:#121826;
    --line:rgba(255,255,255,.08);
    --text:#e5eefc;
    --muted:#93a4bf;
    --accent:#3b82f6;
    --accent2:#22c55e;
    --shadow:0 18px 50px rgba(0,0,0,.45);
  }

  *{box-sizing:border-box}
  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:
      radial-gradient(900px 500px at 15% 0%, rgba(59,130,246,.16), transparent 55%),
      radial-gradient(700px 420px at 100% 10%, rgba(34,197,94,.10), transparent 45%),
      linear-gradient(180deg,var(--bg),var(--bg2));
    color:var(--text);
    font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  }

  .shell{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
  }

  .topbar{
    height:60px;
    flex:0 0 auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:0 16px;
    background:rgba(8,12,20,.72);
    border-bottom:1px solid var(--line);
    backdrop-filter:blur(14px);
  }

  .brand{
    display:flex;
    align-items:center;
    gap:12px;
    min-width:0;
  }

  .badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:8px 12px;
    border-radius:999px;
    background:rgba(59,130,246,.12);
    border:1px solid rgba(59,130,246,.22);
    color:#dbeafe;
    font-size:12px;
    font-weight:800;
    letter-spacing:.08em;
    text-transform:uppercase;
    white-space:nowrap;
  }

  .title-wrap{
    min-width:0;
  }

  .title-wrap h1{
    margin:0;
    font-size:15px;
    line-height:1.1;
    letter-spacing:.3px;
  }

  .title-wrap p{
    margin:3px 0 0;
    font-size:12px;
    color:var(--muted);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .status{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:8px 12px;
    border-radius:999px;
    background:rgba(255,255,255,.04);
    border:1px solid var(--line);
    color:var(--muted);
    font-size:12px;
    white-space:nowrap;
  }

  .dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:var(--accent2);
    box-shadow:0 0 0 4px rgba(34,197,94,.12);
    flex:0 0 auto;
  }

  .main{
    position:relative;
    flex:1 1 auto;
    min-height:0;
    background:#000;
  }

  #frame{
    width:100%;
    height:100%;
    border:0;
    background:#000;
    display:block;
    opacity:0;
    transition:opacity .25s ease;
  }

  .loading{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    background:
      radial-gradient(900px 500px at 15% 0%, rgba(59,130,246,.12), transparent 55%),
      linear-gradient(180deg, rgba(11,14,20,.96), rgba(8,10,16,.98));
    z-index:2;
  }

  .card{
    width:min(560px, 100%);
    border:1px solid var(--line);
    border-radius:26px;
    background:rgba(18,24,38,.92);
    box-shadow:var(--shadow);
    padding:20px;
    text-align:center;
  }

  .card h2{
    margin:0 0 10px;
    font-size:28px;
    line-height:1.05;
    letter-spacing:-.02em;
  }

  .card p{
    margin:0;
    color:var(--muted);
    line-height:1.55;
    font-size:14px;
  }

  .mini{
    margin-top:14px;
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
  }

  .chip{
    padding:8px 12px;
    border-radius:999px;
    border:1px solid var(--line);
    background:rgba(255,255,255,.04);
    color:var(--text);
    font-size:12px;
    font-weight:700;
  }

  @media (max-width: 640px){
    .topbar{
      height:auto;
      padding:12px 14px;
      flex-wrap:wrap;
    }
    .status{
      width:100%;
      justify-content:center;
    }
    .card h2{
      font-size:24px;
    }
  }
</style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="brand">
        <div class="badge">STREAMJAV</div>
        <div class="title-wrap">
          <h1 id="uiTitle">Director</h1>
          <p id="uiSub">Preparando sala y controles</p>
        </div>
      </div>
      <div class="status"><span class="dot"></span><span id="uiStatus">Cargando transmisión</span></div>
    </div>

    <div class="main">
      <div class="loading" id="loading">
        <div class="card">
          <h2>Conectando sala</h2>
          <p>
            La sesión se abrirá dentro de esta misma interfaz con el skin de StreamJav.
          </p>
          <div class="mini">
            <div class="chip">Sala privada</div>
            <div class="chip">Audio virtual</div>
            <div class="chip">Salida de pantalla</div>
          </div>
        </div>
      </div>

      <iframe
        id="frame"
        allow="camera *; microphone *; fullscreen; display-capture; autoplay; picture-in-picture"
        allowfullscreen
        referrerpolicy="no-referrer"
      ></iframe>
    </div>
  </div>

<script>
  const params = new URLSearchParams(location.search);

  const room = params.get("room") || "PROINKASWITCH";
  const push = params.get("push") || "2dj5BAw";
  const name = params.get("name") || "vMix Video";
  const audio = params.get("audio") || "Cable Output";

  const uiTitle = document.getElementById("uiTitle");
  const uiSub = document.getElementById("uiSub");
  const uiStatus = document.getElementById("uiStatus");
  const frame = document.getElementById("frame");
  const loading = document.getElementById("loading");

  uiTitle.textContent = `Director • ${room}`;
  uiSub.textContent = `${name} / ${audio}`;
  uiStatus.textContent = "Cargando transmisión";

  function starize(value) {
    return String(value || "").trim().replaceAll(" ", "*");
  }

  function underscoreize(value) {
    return String(value || "").trim().replace(/\s+/g, "_");
  }

  function buildUrl() {
    return `https://vdo.ninja/?director=${encodeURIComponent(room)}&push=${encodeURIComponent(push)}&vlabel=${encodeURIComponent(starize(name))}&audiodevice=${encodeURIComponent(underscoreize(audio))}&screenshare&screensharetype=1&cleanoutput&cleandirector&autostart&autoplay&nopreview`;
  }

  frame.addEventListener("load", () => {
    loading.style.display = "none";
    frame.style.opacity = "1";
    uiStatus.textContent = "Sala lista";
  });

  frame.src = buildUrl();
</script>
</body>
</html>
