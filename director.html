<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamJav Director</title>

<style>
  :root {
    --bg: #07111f;
    --blue: #4ea1ff;
    --green: #2ddc86;
    --text: #eef4ff;
    --muted: #a4b7d5;
  }
  
  body {
    margin: 0;
    background: #000;
    overflow: hidden;
    font-family: 'Inter', system-ui, sans-serif;
  }
  
  /* Contenedor del Iframe (Restaurado a su tamaño normal para no cortar ajustes) */
  iframe {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
    z-index: 1;
  }

  /* Barra Superior StreamJav */
  .streamjav-overlay {
    position: fixed;
    top: 0;
    left: 0;
    height: 48px;
    width: 100%;
    background: rgba(7, 17, 31, 0.95);
    backdrop-filter: blur(10px);
    z-index: 10;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 15px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    pointer-events: none;
  }

  .logo-mini {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--blue), var(--green));
    color: #03111d;
    display: grid;
    place-items: center;
    font-weight: 900;
    font-size: 14px;
  }

  .brand-name {
    color: var(--text);
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.5px;
  }

  .room-info {
    padding: 4px 12px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: var(--green);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
  }
</style>
</head>

<body>

<div class="streamjav-overlay">
  <div class="logo-mini">S</div>
  <div class="brand-name">STREAMJAV STUDIO</div>
  <div class="room-info" id="room-display">SALA: —</div>
</div>

<iframe id="frame" allow="camera; microphone; display-capture; autoplay; fullscreen"></iframe>

<script>
const params = new URLSearchParams(location.search);

const room = params.get("room") || "PROINKASWITCH";
const push = params.get("push") || "2dj5BAw";
const name = params.get("name") || "vMix Video";
const audio = params.get("audio") || "Line 1 (Virtual Audio Cable)";

document.getElementById("room-display").textContent = `SALA: ${room}`;
const audioFormatted = audio.replaceAll(" ", "*");

/* =========================================================
   1. CREACIÓN DEL CSS INTERNO (Sin archivos externos)
   ========================================================= */
const ninjaCSS = `
  /* Ocultar la caja superior de "LINKS (GUEST INVITES & SCENES)" */
  #headerLinks, 
  #invite_links, 
  .invite-container, 
  div[style*="border-bottom: 2px solid"] { 
      display: none !important; 
  }

  /* Ocultar el "Director's solo link" en el menú de ajustes (Cuadro rojo) */
  #soloLinkContainer, 
  #soloLinkBox, 
  div[data-translate="director_solo_link"] { 
      display: none !important; 
  }
`;

/* =========================================================
   2. CONVERSIÓN A BASE64 PARA INYECTARLO EN LA URL
   ========================================================= */
// Convertimos el texto CSS a código para que la URL lo lea
const base64CSS = btoa(ninjaCSS);
const cssInyectado = "data:text/css;base64," + base64CSS;

/* Generamos la URL sumando nuestro CSS inyectado al final */
const url = `https://vdo.ninja/?director=${room}` +
            `&vlabel=${encodeURIComponent(name)}` +
            `&alabel=${audioFormatted}` +
            `&push=${push}` +
            `&autoplay=1` +
            `&autostart=1` +
            `&lang=es` + 
            `&webcam=1&vd=vMix&ad=Line` +
            `&css=${cssInyectado}`; /* <-- Aquí entra la magia */

document.getElementById("frame").src = url;
</script>

</body>
</html>
