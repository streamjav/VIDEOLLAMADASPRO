<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>StreamJav Director</title>

<style>
body{
  margin:0;
  background:#000;
  overflow:hidden;
}
iframe{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  border:none;
}
</style>
</head>

<body>

<iframe id="frame" allow="camera; microphone; display-capture; autoplay; fullscreen"></iframe>

<script>
const params = new URLSearchParams(location.search);

// valores dinámicos (por si luego quieres usarlos)
const room = params.get("room") || "PROINKASWITCH";
const push = params.get("push") || "2dj5BAw";
const name = params.get("name") || "vMix Video";
const audio = params.get("audio") || "Line 1 (Virtual Audio Cable)";

// IMPORTANTE: formateo para VDO.Ninja
const audioFormatted = audio.replaceAll(" ", "*");

// LINK REAL (EL TUYO ORIGINAL)
const url = `https://vdo.ninja/?director=${room}&vlabel=${name.replaceAll(" ","*")}&alabel=${audioFormatted}&push=${push}&autoplay=1&autostart=1&directorstfu=1&webcam=1`;

// cargar dentro del iframe (disfraz total)
document.getElementById("frame").src = url;
</script>

</body>
</html>
