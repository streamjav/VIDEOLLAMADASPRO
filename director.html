<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>StreamJav Director</title>

<style>
body { margin:0; background:#000; font-family:Arial; }

.topbar {
  position:fixed;
  top:0;
  width:100%;
  height:50px;
  background:#111;
  color:white;
  display:flex;
  align-items:center;
  padding:0 15px;
  z-index:10;
}

iframe {
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  border:none;
}
</style>
</head>

<body>

<div class="topbar">STREAMJAV • DIRECTOR</div>

<iframe id="frame" allow="camera *; microphone *; fullscreen; autoplay"></iframe>

<script>
const params = new URLSearchParams(location.search);
const room = params.get("room") || "SALA1";

document.getElementById("frame").src =
`https://vdo.ninja/?director=${room}&autostart&cleanoutput`;
</script>

</body>
</html>
