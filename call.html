<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitado</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b0f1a;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:90%;
  max-width:380px;
  text-align:center;
}

h1{
  font-size:22px;
  margin-bottom:5px;
}

.sala{
  color:#6c7aa0;
  margin-bottom:20px;
}

video{
  width:100%;
  border-radius:16px;
  background:#000;
  margin-bottom:15px;
}

select{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  margin-bottom:15px;
  background:#1a2135;
  color:#fff;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#3be28f;
  color:#000;
  font-weight:bold;
  font-size:16px;
}
</style>
</head>

<body>

<div class="container">
  <h1 id="title">Bienvenido Invitado 1</h1>
  <div class="sala">PROINKASWITCH</div>

  <video id="preview" autoplay muted playsinline></video>

  <select id="cameraSelect">
    <option value="user">Cámara frontal</option>
    <option value="environment">Cámara trasera</option>
  </select>

  <button onclick="entrar()">COMENZAR</button>
</div>

<!-- VDO NINJA OCULTO -->
<iframe id="frame" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;border:none;"></iframe>

<script>
let stream;
let facing = "user";

async function iniciarCamara(){
  if(stream){
    stream.getTracks().forEach(t=>t.stop());
  }

  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:facing},
      audio:true
    });

    document.getElementById("preview").srcObject = stream;

  }catch(e){
    alert("No se pudo acceder a la cámara");
  }
}

document.getElementById("cameraSelect").onchange = (e)=>{
  facing = e.target.value;
  iniciarCamara();
};

function entrar(){

  // detener preview
  if(stream){
    stream.getTracks().forEach(t=>t.stop());
  }

  // URL limpia VDO NINJA
  const url = `https://vdo.ninja/?room=PROINKASWITCH&push=INV1&webcam&clean&nopreview&facing=${facing}`;

  const frame = document.getElementById("frame");

  frame.src = url;
  frame.style.display = "block";

  document.querySelector(".container").style.display = "none";
}

// iniciar al cargar
iniciarCamara();
</script>

</body>
</html>
