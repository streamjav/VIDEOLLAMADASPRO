<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamJav | Conexión de Invitado</title>
    <style>
        :root {
            --bg: #0b0e14;
            --card: #161b22;
            --accent: #3b82f6;
            --green: #22c55e;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .main-container {
            width: 90%;
            max-width: 400px;
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        h1 { font-size: 20px; margin: 0 0 5px 0; font-weight: 600; }
        .room-label { color: var(--accent); font-size: 14px; font-weight: 700; text-transform: uppercase; margin-bottom: 25px; display: block; }

        .preview-box {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 16px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
            position: relative;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        .control-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 11px; color: var(--text-muted); font-weight: 700; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }

        select {
            width: 100%;
            padding: 14px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            outline: none;
            cursor: pointer;
            appearance: none;
        }

        .btn-start {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .btn-start:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4); }
        .btn-start:active { transform: translateY(0); }
        .btn-start:disabled { background: #30363d; cursor: not-allowed; box-shadow: none; color: #94a3b8; }

        #vdo-frame {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            border: none; background: #000; z-index: 9999;
        }
    </style>
</head>
<body>

<div class="main-container" id="setup-ui">
    <h1 id="user-title">Bienvenido</h1>
    <span class="room-label" id="room-name">Videollamada</span>

    <div class="preview-box">
        <video id="local-preview" autoplay muted playsinline></video>
    </div>

    <div class="control-group">
        <label>Fuente de Video</label>
        <select id="cam-select"></select>
    </div>

    <button class="btn-start" id="btn-start" onclick="iniciarStream()">COMENZAR TRANSMISIÓN</button>
</div>

<iframe id="vdo-frame" allow="camera; microphone; autoplay; display-capture; fullscreen"></iframe>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const room = urlParams.get('room') || 'PROINKASWITCH';
    const push = urlParams.get('push') || 'INV1';
    const name = urlParams.get('name') || 'Invitado';

    document.getElementById('user-title').innerText = `Hola, ${name}`;
    document.getElementById('room-name').innerText = `SALA: ${room}`;

    const camSelect = document.getElementById('cam-select');
    const preview = document.getElementById('local-preview');
    const btnStart = document.getElementById('btn-start');
    let currentStream = null;

    function traducirNombreCamara(label, index) {
        label = label.toLowerCase();
        if (label.includes('front') || label.includes('frontal') || label.includes('user')) {
            return "Cámara Frontal";
        } else if (label.includes('back') || label.includes('trasera') || label.includes('environment')) {
            return "Cámara Trasera";
        }
        return `Cámara ${index + 1}`;
    }

    async function cargarDispositivos() {
        try {
            await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoDevices = devices.filter(d => d.kind === 'videoinput');
            
            camSelect.innerHTML = '';
            videoDevices.forEach((device, index) => {
                const option = document.createElement('option');
                option.value = device.deviceId;
                option.text = traducirNombreCamara(device.label, index);
                camSelect.appendChild(option);
            });

            actualizarPreview();
        } catch (e) {
            alert("Por favor, permite el acceso a la cámara y micrófono.");
        }
    }

    async function actualizarPreview() {
        if (currentStream) currentStream.getTracks().forEach(t => t.stop());
        
        currentStream = await navigator.mediaDevices.getUserMedia({
            video: { deviceId: { exact: camSelect.value } },
            audio: true
        });
        preview.srcObject = currentStream;
    }

    camSelect.onchange = actualizarPreview;

    function iniciarStream() {
        // 1. Identificar si es cámara frontal o trasera por el texto
        let facingParam = "";
        const selectedText = camSelect.options[camSelect.selectedIndex].text.toLowerCase();
        if (selectedText.includes('frontal')) {
            facingParam = "&facing=front";
        } else if (selectedText.includes('trasera')) {
            facingParam = "&facing=back";
        }

        // 2. Apagar la cámara y liberar el hardware INMEDIATAMENTE
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
            preview.srcObject = null;
        }

        // 3. Cambiar el botón para dar feedback al usuario
        btnStart.innerText = "CONECTANDO...";
        btnStart.disabled = true;

        // 4. Retrasar la carga del iframe para que el celular libere la cámara (800ms)
        setTimeout(() => {
            const ninjaUrl = `https://vdo.ninja/?room=${room}&push=${push}&label=${encodeURIComponent(name)}&autostart=1&webcam=1${facingParam}&clean=1&nopreview=1&nochat=1`;
            
            const frame = document.getElementById('vdo-frame');
            frame.src = ninjaUrl;
            
            // Ocultar nuestra interfaz y mostrar el iframe
            document.getElementById('setup-ui').style.display = "none";
            frame.style.display = "block";
            
        }, 800);
    }

    cargarDispositivos();
</script>

</body>
</html>
