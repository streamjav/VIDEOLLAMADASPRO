<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0b0e14">
    <title>StreamJav | Conexión de Invitado</title>
    <style>
        :root {
            --bg: #0b0e14;
            --bg2: #0f1320;
            --card: #161b22;
            --card-2: #0f141c;
            --accent: #3b82f6;
            --accent-2: #2563eb;
            --accent-3: #60a5fa;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --line: rgba(255, 255, 255, 0.08);
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.50);
            --radius: 24px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background:
                radial-gradient(900px 500px at 20% 0%, rgba(59, 130, 246, 0.12), transparent 55%),
                radial-gradient(700px 500px at 100% 10%, rgba(96, 165, 250, 0.08), transparent 45%),
                linear-gradient(180deg, var(--bg), var(--bg2));
            color: var(--text);
            overflow-x: hidden;
            touch-action: manipulation;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100svh;
            padding: calc(10px + env(safe-area-inset-top)) 10px calc(14px + env(safe-area-inset-bottom));
        }

        .main-container {
            width: min(100%, 430px);
            background: linear-gradient(180deg, rgba(22, 27, 34, 0.96), rgba(15, 20, 28, 0.96));
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 28px;
            box-shadow: var(--shadow);
            padding: 16px;
            text-align: center;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(12px);
        }

        .top-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
        }

        .brand-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: #dbeafe;
            background: rgba(59, 130, 246, 0.12);
            border: 1px solid rgba(59, 130, 246, 0.22);
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--line);
            white-space: nowrap;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.10);
            flex: 0 0 auto;
        }

        h1 {
            font-size: clamp(22px, 5vw, 30px);
            line-height: 1.05;
            margin: 2px 0 6px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .room-label {
            display: block;
            margin-bottom: 14px;
            color: var(--accent-3);
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .06em;
        }

        .subtext {
            margin: 0 0 14px;
            color: var(--text-muted);
            font-size: 13px;
            line-height: 1.45;
        }

        .preview-box {
            width: 100%;
            aspect-ratio: 4 / 5;
            max-height: 54vh;
            background: #05070c;
            border-radius: 22px;
            margin-bottom: 14px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #05070c;
            display: block;
        }

        .control-group {
            text-align: left;
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 800;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: .08em;
        }

        select {
            width: 100%;
            min-height: 54px;
            padding: 14px 14px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            outline: none;
            appearance: none;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
        }

        .btn-start {
            width: 100%;
            min-height: 58px;
            padding: 16px 18px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: .02em;
            cursor: pointer;
            transition: transform .16s ease, filter .16s ease, opacity .16s ease;
            box-shadow: 0 10px 24px rgba(59, 130, 246, 0.22);
        }

        .btn-start:hover {
            filter: brightness(1.02);
        }

        .btn-start:active {
            transform: translateY(1px);
        }

        .btn-start:disabled {
            background: #30363d;
            color: #94a3b8;
            box-shadow: none;
            cursor: not-allowed;
        }

        .helper-row {
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            color: var(--text-muted);
            font-size: 12px;
            line-height: 1.4;
        }

        .helper-chip {
            padding: 8px 10px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255,255,255,0.03);
            white-space: nowrap;
        }

        #vdo-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100svh;
            border: none;
            background: #000;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.35s ease;
        }

        @media (max-width: 420px) {
            body {
                padding-left: 8px;
                padding-right: 8px;
            }

            .main-container {
                padding: 14px;
                border-radius: 26px;
            }

            .preview-box {
                aspect-ratio: 3 / 4;
                max-height: 50vh;
            }
        }
    </style>
</head>
<body>

<div class="main-container" id="setup-ui">
    <div class="top-row">
        <div class="brand-badge">STREAMJAV</div>
        <div class="status-pill"><span class="status-dot"></span><span>Listo para entrar</span></div>
    </div>

    <h1 id="user-title">Bienvenido</h1>
    <span class="room-label" id="room-name">SALA: VIDEOLLAMADA</span>
    <p class="subtext">Selecciona tu cámara y comienza la transmisión dentro de una interfaz limpia y móvil.</p>

    <div class="preview-box">
        <video id="local-preview" autoplay muted playsinline></video>
    </div>

    <div class="control-group">
        <label>Fuente de video</label>
        <select id="cam-select"></select>
    </div>

    <button class="btn-start" id="btn-start" onclick="iniciarStream()">COMENZAR TRANSMISIÓN</button>

    <div class="helper-row">
        <div class="helper-chip">Cámara frontal / trasera</div>
        <div class="helper-chip">Vista previa local</div>
    </div>
</div>

<iframe id="vdo-frame" allow="camera *; microphone *; autoplay *; display-capture *; fullscreen" referrerpolicy="no-referrer"></iframe>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const room = urlParams.get('room') || 'SALA_PRO';
    const push = urlParams.get('push') || 'ID_INVITADO';
    const name = urlParams.get('name') || 'Invitado';

    document.getElementById('user-title').innerText = `Bienvenido ${name}`;
    document.getElementById('room-name').innerText = `SALA: ${room}`;

    const camSelect = document.getElementById('cam-select');
    const preview = document.getElementById('local-preview');
    const btnStart = document.getElementById('btn-start');
    let currentStream = null;

    function traducirNombre(label, index) {
        let l = (label || '').toLowerCase();
        if (l.includes('back') || l.includes('trasera') || l.includes('environment')) return "Cámara Trasera";
        if (l.includes('front') || l.includes('frontal') || l.includes('user')) return "Cámara Frontal";
        return `Cámara ${index + 1}`;
    }

    async function cargarDispositivos() {
        try {
            const temp = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            temp.getTracks().forEach(t => t.stop());

            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoDevices = devices.filter(d => d.kind === 'videoinput');

            camSelect.innerHTML = '';
            videoDevices.forEach((device, index) => {
                const option = document.createElement('option');
                option.value = device.deviceId;
                option.text = traducirNombre(device.label, index);
                camSelect.appendChild(option);
            });

            actualizarPreview();
        } catch (e) {
            alert("Acceso a cámara denegado.");
        }
    }

    async function actualizarPreview() {
        if (currentStream) {
            currentStream.getTracks().forEach(t => t.stop());
        }
        try {
            currentStream = await navigator.mediaDevices.getUserMedia({
                video: { deviceId: { exact: camSelect.value } },
                audio: true
            });
            preview.srcObject = currentStream;
        } catch (e) {
            currentStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            preview.srcObject = currentStream;
        }
    }

    camSelect.onchange = actualizarPreview;

    function iniciarStream() {
        let facing = "front";
        const txt = (camSelect.options[camSelect.selectedIndex] && camSelect.options[camSelect.selectedIndex].text || '').toLowerCase();
        if (txt.includes('trasera')) facing = "back";

        if (currentStream) {
            currentStream.getTracks().forEach(t => t.stop());
            preview.srcObject = null;
        }

        btnStart.innerText = "CONECTANDO...";
        btnStart.disabled = true;

        const ninjaUrl = `https://vdo.ninja/?room=${room}&push=${push}&label=${encodeURIComponent(name)}&autostart=1&webcam=1&facing=${facing}&clean=1&nochat=1`;
        const frame = document.getElementById('vdo-frame');
        frame.src = ninjaUrl;

        setTimeout(() => {
            document.getElementById('setup-ui').style.display = "none";
            frame.style.opacity = "1";
            frame.style.zIndex = "9999";
        }, 1200);
    }

    cargarDispositivos();
</script>

</body>
</html>
