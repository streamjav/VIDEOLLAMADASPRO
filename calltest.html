<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0b0e14">
    <title>StreamJav | Conexión de Invitado</title>
    <style>
        :root {
            --bg: #0b0e14;
            --bg2: #0f1320;
            --card: #161b22;
            --card-2: #0f141c;
            --accent: #3b82f6;
            --accent-2: #2563eb;
            --green: #22c55e;
            --green-2: #16a34a;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --line: rgba(255, 255, 255, 0.08);
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.50);
            --radius: 24px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background:
                radial-gradient(900px 500px at 20% 0%, rgba(59, 130, 246, 0.12), transparent 55%),
                radial-gradient(700px 500px at 100% 10%, rgba(96, 165, 250, 0.08), transparent 45%),
                linear-gradient(180deg, var(--bg), var(--bg2));
            color: var(--text);
            overflow-x: hidden;
            touch-action: manipulation;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100svh;
            padding: calc(10px + env(safe-area-inset-top)) 10px calc(14px + env(safe-area-inset-bottom));
        }

        .main-container {
            width: min(100%, 430px);
            background: linear-gradient(180deg, rgba(22, 27, 34, 0.96), rgba(15, 20, 28, 0.96));
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 28px;
            box-shadow: var(--shadow);
            padding: 16px;
            text-align: center;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(12px);
            overflow: hidden;
        }

        .top-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
        }

        .brand-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: #dbeafe;
            background: rgba(59, 130, 246, 0.12);
            border: 1px solid rgba(59, 130, 246, 0.22);
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--line);
            white-space: nowrap;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.10);
            flex: 0 0 auto;
        }

        h1 {
            font-size: clamp(22px, 5vw, 30px);
            line-height: 1.05;
            margin: 2px 0 6px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .room-label {
            display: block;
            margin-bottom: 12px;
            color: var(--accent-3, #60a5fa);
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .06em;
        }

        .subtext-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 0 0 14px;
        }

        .subtext {
            margin: 0;
            color: var(--text-muted);
            font-size: 13px;
            line-height: 1.45;
        }

        .btn-settings {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 0;
        }

        .btn-settings:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .preview-box {
            width: 100%;
            aspect-ratio: 4 / 5;
            max-height: 54vh;
            background: #05070c;
            border-radius: 22px;
            margin-bottom: 14px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #05070c;
            display: block;
        }

        .camera-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 14px;
        }

        .cam-btn {
            min-height: 54px;
            padding: 12px 10px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
            color: #e5eefc;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: transform .16s ease, border-color .16s ease, background .16s ease, color .16s ease;
            width: 100%;
        }

        .cam-btn:active {
            transform: translateY(1px);
        }

        .cam-btn.active {
            border-color: rgba(59, 130, 246, 0.45);
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.22), rgba(37, 99, 235, 0.16));
            color: #ffffff;
            box-shadow: 0 10px 24px rgba(59, 130, 246, 0.12);
        }

        .btn-start {
            width: 100%;
            min-height: 58px;
            padding: 16px 18px;
            background: linear-gradient(135deg, var(--green) 0%, var(--green-2) 100%);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: .02em;
            cursor: pointer;
            transition: transform .16s ease, filter .16s ease, opacity .16s ease;
            box-shadow: 0 10px 24px rgba(34, 197, 94, 0.22);
        }

        .btn-start:hover {
            filter: brightness(1.02);
        }

        .btn-start:active {
            transform: translateY(1px);
        }

        .btn-start:disabled {
            background: #30363d;
            color: #94a3b8;
            box-shadow: none;
            cursor: not-allowed;
        }

        #vdo-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100svh;
            border: none;
            background: #000;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.35s ease;
        }

        /* --- Estilos del Modal de Configuración --- */
        .modal-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(11, 14, 20, 0.95);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            text-align: left;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 16px;
            font-weight: 800;
            color: var(--text);
        }

        .btn-close-modal {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 24px;
            line-height: 1;
            cursor: pointer;
            padding: 0;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 6px;
            letter-spacing: 0.05em;
        }

        .adv-select {
            width: 100%;
            background: #0b0e14;
            color: var(--text);
            border: 1px solid var(--line);
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2394a3b8%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat, repeat;
            background-position: right .7em top 50%, 0 0;
            background-size: .65em auto, 100%;
        }

        .adv-select:focus {
            border-color: var(--accent);
        }

        .btn-save {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.22), rgba(37, 99, 235, 0.16));
            border: 1px solid rgba(59, 130, 246, 0.45);
            border-radius: 12px;
            color: #ffffff;
            font-weight: 800;
            cursor: pointer;
            margin-top: 8px;
        }

        @media (max-width: 420px) {
            body {
                padding-left: 8px;
                padding-right: 8px;
            }

            .main-container {
                padding: 14px;
                border-radius: 26px;
            }

            .preview-box {
                aspect-ratio: 3 / 4;
                max-height: 50vh;
            }

            .camera-row {
                gap: 8px;
            }

            .cam-btn {
                min-height: 50px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

<div class="main-container" id="setup-ui">
    <div class="top-row">
        <div class="brand-badge">STREAMJAV</div>
        <div class="status-pill"><span class="status-dot"></span><span>Listo para entrar</span></div>
    </div>

    <h1 id="user-title">Bienvenido</h1>
    <span class="room-label" id="room-name">SALA: VIDEOLLAMADA</span>
    
    <div class="subtext-row">
        <p class="subtext">Selecciona tu cámara y comienza la transmisión</p>
        <button class="btn-settings" onclick="toggleConfig()" title="Configuración Avanzada">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
        </button>
    </div>

    <div class="preview-box">
        <video id="local-preview" autoplay muted playsinline></video>
    </div>

    <div class="camera-row">
        <button type="button" class="cam-btn active" id="btn-front" onclick="seleccionarCamara('front')">Cámara Frontal</button>
        <button type="button" class="cam-btn" id="btn-back" onclick="seleccionarCamara('back')">Cámara Trasera</button>
    </div>

    <button class="btn-start" id="btn-start" onclick="iniciarStream()">COMENZAR TRANSMISIÓN</button>

    <div id="modal-config" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Configuración Avanzada</h3>
                <button class="btn-close-modal" onclick="toggleConfig()">&times;</button>
            </div>
            
            <div class="form-group">
                <label>Dispositivo de Video</label>
                <select id="cam-select" class="adv-select"></select>
            </div>
            
            <div class="form-group">
                <label>Dispositivo de Audio (Mic)</label>
                <select id="mic-select" class="adv-select"></select>
            </div>
            
            <div class="form-group">
                <label>Salida de Audio (Altavoz)</label>
                <select id="speaker-select" class="adv-select"></select>
            </div>

            <button class="btn-save" onclick="toggleConfig()">Aceptar y Cerrar</button>
        </div>
    </div>
</div>

<iframe id="vdo-frame" allow="camera *; microphone *; autoplay *; display-capture *; fullscreen" referrerpolicy="no-referrer"></iframe>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const room = urlParams.get('room') || 'SALA_PRO';
    const push = urlParams.get('push') || 'ID_INVITADO';
    const name = urlParams.get('name') || 'Invitado';

    document.getElementById('user-title').innerText = `Bienvenido ${name}`;
    document.getElementById('room-name').innerText = `SALA: ${room}`;

    const camSelect = document.getElementById('cam-select');
    const micSelect = document.getElementById('mic-select');
    const speakerSelect = document.getElementById('speaker-select');

    const preview = document.getElementById('local-preview');
    const btnStart = document.getElementById('btn-start');
    const btnFront = document.getElementById('btn-front');
    const btnBack = document.getElementById('btn-back');
    let currentStream = null;
    let cameraMode = 'front';

    function toggleConfig() {
        const modal = document.getElementById('modal-config');
        modal.classList.toggle('show');
    }

    function traducirNombre(label, index) {
        const cleanLabel = (label || '').trim();
        const l = cleanLabel.toLowerCase();

        if (cleanLabel) {
            if (l.includes('back') || l.includes('trasera') || l.includes('environment')) return `Cámara Trasera - ${cleanLabel}`;
            if (l.includes('front') || l.includes('frontal') || l.includes('user')) return `Cámara Frontal - ${cleanLabel}`;
            return cleanLabel;
        }

        return `Cámara ${index + 1}`;
    }

    async function cargarDispositivos() {
        try {
            const temp = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            temp.getTracks().forEach(t => t.stop());

            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoDevices = devices.filter(d => d.kind === 'videoinput');
            const audioInDevices = devices.filter(d => d.kind === 'audioinput');
            const audioOutDevices = devices.filter(d => d.kind === 'audiooutput');

            // Cargar Cámaras
            camSelect.innerHTML = '';
            videoDevices.forEach((device, index) => {
                const option = document.createElement('option');
                option.value = device.deviceId;
                option.text = traducirNombre(device.label, index);
                option.dataset.label = device.label || '';
                camSelect.appendChild(option);
            });

            // Cargar Micrófonos (Corrección: Agregado dataset.label para extraer el nombre exacto)
            micSelect.innerHTML = '';
            audioInDevices.forEach((device, index) => {
                const option = document.createElement('option');
                option.value = device.deviceId;
                option.text = device.label || `Micrófono ${index + 1}`;
                option.dataset.label = device.label || '';
                micSelect.appendChild(option);
            });

            // Cargar Altavoces (Corrección: Agregado dataset.label para extraer el nombre exacto)
            speakerSelect.innerHTML = '';
            if(audioOutDevices.length === 0) {
                const option = document.createElement('option');
                option.text = "Predeterminado del sistema";
                speakerSelect.appendChild(option);
                speakerSelect.disabled = true;
            } else {
                audioOutDevices.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Altavoz ${index + 1}`;
                    option.dataset.label = device.label || '';
                    speakerSelect.appendChild(option);
                });
            }

            if (camSelect.options.length > 0) {
                seleccionarCamara('front');
            } else {
                actualizarPreview();
            }
        } catch (e) {
            alert("Acceso a cámara o micrófono denegado.");
        }
    }

    async function actualizarPreview() {
        if (currentStream) {
            currentStream.getTracks().forEach(t => t.stop());
        }
        try {
            const constraints = {
                video: camSelect.value ? { deviceId: { exact: camSelect.value } } : true,
                audio: micSelect.value ? { deviceId: { exact: micSelect.value } } : true
            };
            
            currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            preview.srcObject = currentStream;

            if (speakerSelect.value && typeof preview.setSinkId !== 'undefined') {
                await preview.setSinkId(speakerSelect.value);
            }
        } catch (e) {
            currentStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            preview.srcObject = currentStream;
        }
    }

    camSelect.onchange = actualizarPreview;
    micSelect.onchange = actualizarPreview;
    speakerSelect.onchange = async () => {
        if (speakerSelect.value && typeof preview.setSinkId !== 'undefined') {
            try { await preview.setSinkId(speakerSelect.value); } catch(e) { console.error(e); }
        }
    };

    function seleccionarCamara(tipo) {
        cameraMode = tipo;
        btnFront.classList.toggle('active', tipo === 'front');
        btnBack.classList.toggle('active', tipo === 'back');

        const txts = Array.from(camSelect.options).map(opt => opt.text.toLowerCase());
        let idx = -1;

        if (tipo === 'front') {
            idx = txts.findIndex(t => t.includes('frontal') || t.includes('front') || t.includes('user'));
        } else if (tipo === 'back') {
            idx = txts.findIndex(t => t.includes('trasera') || t.includes('back') || t.includes('environment'));
        }

        if (idx >= 0) {
            camSelect.selectedIndex = idx;
            actualizarPreview();
        } else if (camSelect.options.length > 0) {
            camSelect.selectedIndex = 0;
            actualizarPreview();
        }
    }

    function iniciarStream() {
        const selectedCameraOption = camSelect.options[camSelect.selectedIndex];
        const selectedCameraText = ((selectedCameraOption && selectedCameraOption.text) || '').toLowerCase();
        const selectedCameraLabel = (selectedCameraOption && selectedCameraOption.dataset && selectedCameraOption.dataset.label) || '';
        const selectedCameraLabelText = selectedCameraLabel.toLowerCase();
        let facing = "";

        if (selectedCameraText.includes('trasera') || selectedCameraLabelText.includes('back') || selectedCameraLabelText.includes('environment')) {
            facing = "back";
        } else if (selectedCameraText.includes('frontal') || selectedCameraLabelText.includes('front') || selectedCameraLabelText.includes('user')) {
            facing = "front";
        }

        if (currentStream) {
            currentStream.getTracks().forEach(t => t.stop());
            preview.srcObject = null;
        }

        btnStart.innerText = "CONECTANDO...";
        btnStart.disabled = true;

        let extraParams = '';
        
        // Video
        if (facing) {
            extraParams += `&facing=${encodeURIComponent(facing)}`;
        } else if (selectedCameraLabel) {
            extraParams += `&videodevice=${encodeURIComponent(selectedCameraLabel)}`;
        } else if (camSelect.value) {
            extraParams += `&videodevice=${encodeURIComponent(camSelect.value)}`;
        }

        // CORRECCIÓN AUDIO IN (Microfono): Enviamos el Label (nombre) en vez del ID de dominio
        const selectedMicOption = micSelect.options[micSelect.selectedIndex];
        const micLabel = selectedMicOption ? selectedMicOption.dataset.label : '';
        if (micLabel) {
            extraParams += `&ad=${encodeURIComponent(micLabel)}`;
        } else if (micSelect.value) {
            // Fallback en caso de que el label esté vacío
            extraParams += `&ad=${encodeURIComponent(micSelect.value)}`;
        }

        // CORRECCIÓN AUDIO OUT (Altavoz): Enviamos el Label en vez del ID de dominio
        const selectedSpeakerOption = speakerSelect.options[speakerSelect.selectedIndex];
        const speakerLabel = selectedSpeakerOption ? selectedSpeakerOption.dataset.label : '';
        if (!speakerSelect.disabled) {
            if (speakerLabel) {
                extraParams += `&od=${encodeURIComponent(speakerLabel)}`;
            } else if (speakerSelect.value) {
                extraParams += `&od=${encodeURIComponent(speakerSelect.value)}`;
            }
        }

        const ninjaUrl = `https://vdo.ninja/?room=${room}&push=${push}&label=${encodeURIComponent(name)}&autostart=1&webcam=1&clean=1&nochat=1${extraParams}`;

        const frame = document.getElementById('vdo-frame');
        frame.src = ninjaUrl;

        setTimeout(() => {
            document.getElementById('setup-ui').style.display = "none";
            frame.style.opacity = "1";
            frame.style.zIndex = "9999";
        }, 1200);
    }

    cargarDispositivos();
</script>

</body>
</html>
